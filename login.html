<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Ministério Semente</title>
  <link rel="stylesheet" href="login.css" />
  <meta name="theme-color" content="#6b8e4e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Ministério Semente" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
</head>
<body>

  <div class="login-wrapper">

    <div class="login-card">

      <!-- LOGO -->
      <div class="login-logo">
        <img src="logo.png" alt="Ministério Semente" />
      </div>

      <!-- TELA: LOGIN -->
      <div id="tela-login">
        <h2>Bem-vindo de volta 👋</h2>
        <p class="login-sub">Faça login para acessar o sistema</p>

        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="input-email" placeholder="seu@email.com" />
        </div>

        <div class="form-group">
          <label>Senha</label>
          <div class="input-senha-wrap">
            <input type="password" id="input-senha" placeholder="••••••••"
              onkeydown="if(event.key==='Enter') fazerLogin()" />
            <button class="btn-olho" onclick="toggleSenha('input-senha', this)">👁️</button>
          </div>
        </div>

        <div id="login-erro" class="erro-msg" style="display:none;"></div>

        <button class="btn-login" onclick="fazerLogin()" id="btn-entrar">
          Entrar
        </button>

        <button class="link-btn" onclick="mostrarTela('tela-esqueci')">
          Esqueci minha senha
        </button>
      </div>

      <!-- TELA: ESQUECI A SENHA -->
      <div id="tela-esqueci" style="display:none;">
        <h2>Recuperar senha 🔑</h2>
        <p class="login-sub">Enviaremos um link de redefinição para seu e-mail</p>

        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="input-email-reset" placeholder="seu@email.com" />
        </div>

        <div id="reset-msg" class="erro-msg" style="display:none;"></div>

        <button class="btn-login" onclick="enviarReset()" id="btn-reset">
          Enviar link
        </button>

        <button class="link-btn" onclick="mostrarTela('tela-login')">
          ← Voltar ao login
        </button>
      </div>

      <!-- TELA: DEFINIR NOVA SENHA (convite ou reset) -->
      <div id="tela-nova-senha" style="display:none;">
        <h2>Criar sua senha 🔐</h2>
        <p class="login-sub">Escolha uma senha segura para sua conta</p>

        <div class="form-group">
          <label>Nova senha</label>
          <div class="input-senha-wrap">
            <input type="password" id="input-nova-senha" placeholder="Mínimo 6 caracteres" />
            <button class="btn-olho" onclick="toggleSenha('input-nova-senha', this)">👁️</button>
          </div>
        </div>

        <div class="form-group">
          <label>Confirmar senha</label>
          <div class="input-senha-wrap">
            <input type="password" id="input-confirma-senha" placeholder="Repita a senha" />
            <button class="btn-olho" onclick="toggleSenha('input-confirma-senha', this)">👁️</button>
          </div>
        </div>

        <div id="nova-senha-msg" class="erro-msg" style="display:none;"></div>

        <button class="btn-login" onclick="definirNovaSenha()" id="btn-nova-senha">
          Salvar senha e entrar
        </button>
      </div>

    </div>

    <p class="login-footer">Ministério Semente © 2025</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>  <script src="supabase.js"></script>
  <script src="login.js"></script>
  <script src="/pwa.js"></script>
</body>
</html>
