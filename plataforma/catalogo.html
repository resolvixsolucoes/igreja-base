<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo de Cursos — Ministério Semente</title>
  <link rel="stylesheet" href="plataforma.css"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png"/><link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin/>
</head>
<body>

<div id="plat-overlay" class="plat-overlay" onclick="fecharSidebar()"></div>
<div id="plat-toast"></div>

<div class="plat-layout">

  <!-- SIDEBAR -->
  <aside class="plat-sidebar" id="plat-sidebar">
    <div class="plat-sidebar-logo">
      <img src="/logo.png" alt="Ministério Semente"/>
      <span>Plataforma de Cursos</span>
    </div>
    <nav class="plat-nav">
      <a href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Meu Painel
      </a>
      <a href="catalogo.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Catálogo
      </a>
      <div class="plat-nav-divider"></div>
      <a href="perfil.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Meu Perfil
      </a>
    </nav>
    <div class="plat-sidebar-user">
      <div class="plat-avatar" id="plat-user-avatar">A</div>
      <div class="plat-user-info">
        <strong id="plat-user-nome">Carregando...</strong>
        <span id="plat-user-tipo">—</span>
      </div>
      <button class="btn-plat-logout" onclick="platLogout()" title="Sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="plat-main">
    <div class="plat-topbar">
      <button class="plat-hamburger" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1>Catálogo de Cursos</h1>
    </div>

    <div class="plat-content">

      <!-- Filtros -->
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:24px">
        <div style="position:relative;flex:1;min-width:200px;max-width:340px">
          <svg style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa;width:15px;height:15px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="busca" placeholder="Buscar cursos..." oninput="filtrar()"
            style="width:100%;padding:10px 12px 10px 36px;border:1.5px solid var(--border);border-radius:10px;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .2s;background:#fff"
            onfocus="this.style.borderColor='var(--brand)'" onblur="this.style.borderColor='var(--border)'"/>
        </div>
        <div id="filtro-nivel" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>

      <!-- Badge membro -->
      <div id="banner-membro" style="display:none;background:var(--brand-light);border:1.5px solid var(--brand-mid);border-radius:12px;padding:12px 18px;margin-bottom:24px;align-items:center;gap:10px;font-size:13px;font-weight:600;color:var(--brand-deep)">
        🎓 Você é membro do Ministério Semente — todos os cursos estão liberados gratuitamente para você!
      </div>

      <!-- Estado -->
      <div class="estado-vazio" id="estado-carregando">
        <div style="font-size:2.2rem">⏳</div>
        <h3>Carregando cursos...</h3>
      </div>
      <div class="estado-vazio" id="estado-vazio" style="display:none">
        <div class="icone">🎓</div>
        <h3>Nenhum curso disponível</h3>
        <p>Novos cursos serão publicados em breve. Fique ligado!</p>
      </div>

      <!-- Grid -->
      <div class="cursos-grid" id="cursos-grid"></div>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script src="/supabase.js"></script>
<script src="plataforma-auth.js"></script>
<script>
  let todosCursos     = []
  let nivelAtivo      = 'todos'
  let cursosConcluidos = new Set()

  function toast(msg, tipo = 'ok') {
    const el = document.getElementById('plat-toast')
    el.textContent = msg
    el.className = `show ${tipo}`
    setTimeout(() => el.className = '', 3500)
  }

  function toggleSidebar() {
    document.getElementById('plat-sidebar').classList.toggle('open')
    document.getElementById('plat-overlay').classList.toggle('active')
  }
  function fecharSidebar() {
    document.getElementById('plat-sidebar').classList.remove('open')
    document.getElementById('plat-overlay').classList.remove('active')
  }

  function formatarPreco(curso) {
    if (ALUNO.isMembro && curso.gratuito_para_membros) return 'Gratuito para membros'
    if (curso.preco === 0) return 'Gratuito'
    return `R$ ${Number(curso.preco).toFixed(2).replace('.',',')}`
  }

  function nivelLabel(nivel) {
    return { iniciante: 'Iniciante', intermediario: 'Intermediário', avancado: 'Avançado' }[nivel] || nivel
  }

  function renderCursos(lista) {
    const grid = document.getElementById('cursos-grid')
    const vazio = document.getElementById('estado-vazio')
    if (!lista.length) { grid.innerHTML = ''; vazio.style.display = 'flex'; return }
    vazio.style.display = 'none'

    grid.innerHTML = lista.map(c => {
      const concluido = cursosConcluidos.has(c.id)
      const preco    = concluido ? '✅ Concluído' : formatarPreco(c)
      const gratuito = concluido || preco === 'Gratuito' || preco === 'Gratuito para membros'
      const carga    = c.carga_horaria_min ? `${Math.floor(c.carga_horaria_min/60)}h${c.carga_horaria_min%60 ? c.carga_horaria_min%60+'min' : ''}` : ''
      return `
        <a class="curso-card" href="curso.html?id=${c.id}">
          <div class="curso-card-thumb">
            ${c.thumbnail_url
              ? `<img src="${esc(c.thumbnail_url)}" alt="${esc(c.titulo)}" loading="lazy">`
              : `<div class="curso-card-thumb-placeholder">🎓</div>`}
            ${c.nivel ? `<span class="curso-card-nivel">${nivelLabel(c.nivel)}</span>` : ''}
          </div>
          <div class="curso-card-body">
            ${c.categoria ? `<div class="curso-card-cat">${esc(c.categoria)}</div>` : ''}
            <div class="curso-card-titulo">${esc(c.titulo)}</div>
            ${c.descricao ? `<div class="curso-card-desc">${esc(c.descricao)}</div>` : ''}
            <div class="curso-card-footer">
              <span class="curso-card-preco ${gratuito ? 'gratuito' : ''}">${preco}</span>
              ${carga ? `<span class="curso-card-carga">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${carga}
              </span>` : ''}
            </div>
          </div>
        </a>`
    }).join('')
  }

  function filtrar() {
    const busca = document.getElementById('busca').value.toLowerCase()
    let lista = todosCursos
    if (nivelAtivo !== 'todos') lista = lista.filter(c => c.nivel === nivelAtivo)
    if (busca) lista = lista.filter(c =>
      c.titulo.toLowerCase().includes(busca) ||
      (c.descricao||'').toLowerCase().includes(busca) ||
      (c.categoria||'').toLowerCase().includes(busca)
    )
    renderCursos(lista)
  }

  function popularFiltroNivel() {
    const niveis = [...new Set(todosCursos.map(c => c.nivel).filter(Boolean))]
    const wrap = document.getElementById('filtro-nivel')
    const all  = ['todos', ...niveis]
    wrap.innerHTML = all.map(n => `
      <button onclick="selecionarNivel('${n}', this)"
        style="padding:6px 14px;border-radius:20px;border:1.5px solid ${n==='todos'?'var(--brand)':'var(--border)'};
               background:${n==='todos'?'var(--brand)':'transparent'};color:${n==='todos'?'#fff':'var(--muted)'};
               font-size:12.5px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit">
        ${n === 'todos' ? 'Todos' : nivelLabel(n)}
      </button>`).join('')
  }

  function selecionarNivel(nivel, btn) {
    nivelAtivo = nivel
    document.querySelectorAll('#filtro-nivel button').forEach(b => {
      const ativo = b === btn
      b.style.background    = ativo ? 'var(--brand)' : 'transparent'
      b.style.color         = ativo ? '#fff' : 'var(--muted)'
      b.style.borderColor   = ativo ? 'var(--brand)' : 'var(--border)'
    })
    filtrar()
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  document.addEventListener('plataforma:ready', async ({ detail: { aluno } }) => {
    // Badge membro
    if (aluno.is_membro) {
      document.getElementById('banner-membro').style.display = 'flex'
    }
    // Tipo na sidebar
    document.getElementById('plat-user-tipo').textContent =
      aluno.is_membro ? '⭐ Membro' : 'Aluno'

    // Carrega cursos + matrículas concluídas (em paralelo)
    const [cursosRes, matRes] = await Promise.all([
      db.from('cursos_lms')
        .select('id,titulo,descricao,thumbnail_url,carga_horaria_min,nivel,categoria,preco,gratuito_para_membros')
        .eq('publicado', true)
        .order('ordem'),
      db.from('matriculas_lms')
        .select('curso_id')
        .eq('aluno_id', ALUNO.user.id)
        .eq('status', 'concluida'),
    ])
    const { data, error } = cursosRes
    cursosConcluidos = new Set((matRes.data || []).map(m => m.curso_id))

    document.getElementById('estado-carregando').style.display = 'none'

    if (error || !data?.length) {
      document.getElementById('estado-vazio').style.display = 'flex'
      return
    }

    todosCursos = data
    popularFiltroNivel()
    renderCursos(todosCursos)
  })
</script>
</body>
</html>
