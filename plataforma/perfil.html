<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meu Perfil — Sua Igreja</title>
  <link rel="stylesheet" href="plataforma.css"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png"/>
</head>
<body>

<div id="plat-overlay" class="plat-overlay" onclick="fecharSidebar()"></div>
<div id="plat-toast"></div>

<div class="plat-layout">

  <!-- SIDEBAR -->
  <aside class="plat-sidebar" id="plat-sidebar">
    <div class="plat-sidebar-logo">
      <img src="/logo.png" alt="Sua Igreja"/>
      <span>Plataforma de Cursos</span>
    </div>
    <nav class="plat-nav">
      <a href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Meu Painel
      </a>
      <a href="catalogo.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Catálogo
      </a>
      <div class="plat-nav-divider"></div>
      <a href="perfil.html" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Meu Perfil
      </a>
    </nav>
    <div class="plat-sidebar-user">
      <div class="plat-avatar" id="plat-user-avatar">A</div>
      <div class="plat-user-info">
        <strong id="plat-user-nome">Carregando...</strong>
        <span id="plat-user-tipo">—</span>
      </div>
      <button class="btn-plat-logout" onclick="platLogout()" title="Sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="plat-main">
    <div class="plat-topbar">
      <button class="plat-hamburger" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1>Meu Perfil</h1>
    </div>

    <div class="plat-content">
      <div class="perfil-grid">

        <!-- Card: identidade -->
        <div class="plat-card perfil-card-id">
          <div class="perfil-avatar-wrap">

            <!-- Foto clicável -->
            <div class="perfil-avatar-container" onclick="document.getElementById('input-foto').click()" title="Alterar foto">
              <div class="perfil-avatar" id="perfil-avatar">A</div>
              <div class="perfil-avatar-overlay">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <span>Alterar foto</span>
              </div>
              <input type="file" id="input-foto" accept="image/*" style="display:none" onchange="uploadFoto(this)"/>
            </div>
            <div id="upload-progress" style="display:none;font-size:12px;color:var(--brand);margin-top:4px">Enviando foto...</div>

            <div>
              <div class="perfil-nome-grande" id="perfil-nome-grande">—</div>
              <div class="perfil-apelido" id="perfil-apelido-exibir" style="display:none"></div>
              <div id="perfil-badge-membro" style="display:none" class="badge badge-membro">
                ⭐ Membro da Sua Igreja
              </div>
              <div class="perfil-email" id="perfil-email">—</div>
            </div>
          </div>
        </div>

        <!-- Card: dados pessoais -->
        <div class="plat-card perfil-section">
          <div class="perfil-section-header">
            <h3>Dados pessoais</h3>
            <button class="btn-ghost perfil-edit-btn" id="btn-editar-dados" onclick="toggleEditar('dados')" style="font-size:12px;padding:6px 14px">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Editar
            </button>
          </div>

          <form id="form-dados" onsubmit="salvarDados(event)">
            <div class="perfil-campos">
              <div class="perfil-campo" style="flex-basis:100%">
                <label>Nome completo</label>
                <input type="text" name="nome" id="campo-nome" disabled required maxlength="120"/>
              </div>
              <div class="perfil-campo" style="flex-basis:100%">
                <label>Como quer ser chamado <span style="font-weight:400;text-transform:none;font-size:11px;color:var(--muted)">(apelido)</span></label>
                <input type="text" name="apelido" id="campo-apelido" disabled maxlength="50" placeholder="Ex: Brunão, Pastor Bruno..."/>
              </div>
              <div class="perfil-campo">
                <label>Telefone</label>
                <input type="tel" name="telefone" id="campo-telefone" disabled maxlength="15" oninput="mascaraTel(this)"/>
              </div>
            </div>
            <div id="perfil-dados-actions" style="display:none;gap:8px;margin-top:16px">
              <button type="submit" class="btn-primary" style="font-size:13px;padding:9px 20px">Salvar alterações</button>
              <button type="button" class="btn-ghost" style="font-size:13px;padding:9px 20px" onclick="cancelarEditar('dados')">Cancelar</button>
            </div>
          </form>
        </div>

        <!-- Card: endereço -->
        <div class="plat-card perfil-section">
          <div class="perfil-section-header">
            <h3>Endereço</h3>
            <button class="btn-ghost" id="btn-editar-end" onclick="toggleEditar('end')" style="font-size:12px;padding:6px 14px">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Editar
            </button>
          </div>
          <form id="form-end" onsubmit="salvarEndereco(event)">
            <div class="perfil-campos">
              <div class="perfil-campo" style="max-width:160px;position:relative">
                <label>CEP</label>
                <input type="text" name="cep" id="campo-cep" disabled maxlength="9"
                  oninput="mascaraCep(this); autoBuscarCep(this.value)"
                  onblur="buscarCep(this.value)"/>
                <span id="cep-status-perfil" style="position:absolute;right:10px;bottom:10px;font-size:12px;color:var(--brand)"></span>
              </div>
              <div class="perfil-campo" style="flex:2">
                <label>Logradouro</label>
                <input type="text" name="logradouro" id="campo-logradouro" disabled maxlength="200"/>
              </div>
              <div class="perfil-campo" style="max-width:100px">
                <label>Número</label>
                <input type="text" name="numero" id="campo-numero" disabled maxlength="20"/>
              </div>
              <div class="perfil-campo">
                <label>Complemento</label>
                <input type="text" name="complemento" id="campo-complemento" disabled maxlength="100"/>
              </div>
              <div class="perfil-campo">
                <label>Bairro</label>
                <input type="text" name="bairro" id="campo-bairro" disabled maxlength="100"/>
              </div>
              <div class="perfil-campo" style="flex:2">
                <label>Cidade</label>
                <input type="text" name="cidade" id="campo-cidade" disabled maxlength="100"/>
              </div>
              <div class="perfil-campo" style="max-width:70px">
                <label>UF</label>
                <input type="text" name="uf" id="campo-uf" disabled maxlength="2"/>
              </div>
            </div>
            <div id="perfil-end-actions" style="display:none;gap:8px;margin-top:16px">
              <button type="submit" class="btn-primary" style="font-size:13px;padding:9px 20px">Salvar endereço</button>
              <button type="button" class="btn-ghost" style="font-size:13px;padding:9px 20px" onclick="cancelarEditar('end')">Cancelar</button>
            </div>
          </form>
        </div>

        <!-- Card: segurança -->
        <div class="plat-card perfil-section" style="grid-column:1/-1">
          <div class="perfil-section-header">
            <h3>Segurança</h3>
          </div>
          <div class="perfil-campos">
            <div class="perfil-campo">
              <label>E-mail</label>
              <input type="email" id="campo-email-seg" disabled/>
            </div>
          </div>
          <div style="margin-top:16px">
            <button class="btn-ghost" onclick="enviarResetSenha()" style="font-size:13px;padding:9px 18px">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Redefinir senha por e-mail
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script src="/supabase.js"></script>
<script src="plataforma-auth.js"></script>
<script>
  let alunoAtual = null
  let editando   = {}

  function toast(msg, tipo = 'ok') {
    const el = document.getElementById('plat-toast')
    el.textContent = msg; el.className = `show ${tipo}`
    setTimeout(() => el.className = '', 3500)
  }

  function toggleSidebar() {
    document.getElementById('plat-sidebar').classList.toggle('open')
    document.getElementById('plat-overlay').classList.toggle('active')
  }
  function fecharSidebar() {
    document.getElementById('plat-sidebar').classList.remove('open')
    document.getElementById('plat-overlay').classList.remove('active')
  }

  function mascaraTel(input) {
    let v = input.value.replace(/\D/g,'').slice(0,11)
    if (v.length > 10)      v = v.replace(/^(\d{2})(\d{5})(\d{4})$/,'($1) $2-$3')
    else if (v.length > 6)  v = v.replace(/^(\d{2})(\d{4})(\d*)$/,'($1) $2-$3')
    else if (v.length > 2)  v = v.replace(/^(\d{2})(\d*)$/,'($1) $2')
    input.value = v
  }

  function mascaraCep(input) {
    let v = input.value.replace(/\D/g,'').slice(0,8)
    if (v.length > 5) v = v.replace(/^(\d{5})(\d*)$/,'$1-$2')
    input.value = v
  }

  let cepTimer = null
  function autoBuscarCep(val) {
    clearTimeout(cepTimer)
    const digits = val.replace(/\D/g,'')
    if (digits.length === 8) {
      cepTimer = setTimeout(() => buscarCep(val), 300)
    }
  }

  async function buscarCep(cep) {
    const digits = cep.replace(/\D/g,'')
    if (digits.length !== 8) return
    const status = document.getElementById('cep-status-perfil')
    if (status) status.textContent = '⏳'
    try {
      const r = await fetch(`https://viacep.com.br/ws/${digits}/json/`)
      const d = await r.json()
      if (d.erro) { if (status) status.textContent = '❌'; return }
      const s = (id, v) => { const el = document.getElementById(id); if (el && !el.disabled) el.value = v || '' }
      s('campo-logradouro', d.logradouro)
      s('campo-bairro',     d.bairro)
      s('campo-cidade',     d.localidade)
      s('campo-uf',         d.uf)
      if (status) { status.textContent = '✅'; setTimeout(() => status.textContent = '', 2000) }
      document.getElementById('campo-numero')?.focus()
    } catch {
      if (status) status.textContent = ''
    }
  }

  function toggleEditar(secao) {
    const campos = secao === 'dados'
      ? ['campo-nome','campo-apelido','campo-telefone']
      : ['campo-cep','campo-logradouro','campo-numero','campo-complemento','campo-bairro','campo-cidade','campo-uf']
    const actionsId = `perfil-${secao === 'dados' ? 'dados' : 'end'}-actions`
    const btnId     = `btn-editar-${secao === 'dados' ? 'dados' : 'end'}`

    editando[secao] = !editando[secao]
    campos.forEach(id => { const el = document.getElementById(id); if (el) el.disabled = !editando[secao] })
    document.getElementById(actionsId).style.display = editando[secao] ? 'flex' : 'none'
    document.getElementById(btnId).style.display     = editando[secao] ? 'none' : 'flex'
  }

  function cancelarEditar(secao) {
    preencherFormulario(alunoAtual)
    editando[secao] = true
    toggleEditar(secao)
  }

  function preencherFormulario(aluno) {
    const s = (id, v) => { const el = document.getElementById(id); if (el) el.value = v || '' }
    s('campo-nome',        aluno.nome)
    s('campo-apelido',     aluno.apelido)
    s('campo-telefone',    aluno.telefone)
    s('campo-cep',         aluno.cep)
    s('campo-logradouro',  aluno.logradouro)
    s('campo-numero',      aluno.numero)
    s('campo-complemento', aluno.complemento)
    s('campo-bairro',      aluno.bairro)
    s('campo-cidade',      aluno.cidade)
    s('campo-uf',          aluno.uf)
    s('campo-email-seg',   aluno.email)

    const apelido      = aluno.apelido || aluno.nome?.split(' ')[0] || 'A'
    const nomeExibir   = aluno.nome || '—'
    const avatarLetra  = apelido[0].toUpperCase()

    // Foto ou letra
    const avatarEl = document.getElementById('perfil-avatar')
    if (aluno.foto_url) {
      avatarEl.innerHTML = `<img src="${aluno.foto_url}" alt="Foto" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`
    } else {
      avatarEl.textContent = avatarLetra
    }

    // Sidebar
    const sideAvatar = document.getElementById('plat-user-avatar')
    if (aluno.foto_url) {
      sideAvatar.innerHTML = `<img src="${aluno.foto_url}" alt="Foto" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`
    } else {
      sideAvatar.textContent = avatarLetra
    }

    document.getElementById('perfil-nome-grande').textContent = nomeExibir
    document.getElementById('perfil-email').textContent = aluno.email || '—'

    const apelidoExibir = document.getElementById('perfil-apelido-exibir')
    if (aluno.apelido) {
      apelidoExibir.textContent = `"${aluno.apelido}"`
      apelidoExibir.style.display = 'block'
    } else {
      apelidoExibir.style.display = 'none'
    }

    if (aluno.is_membro) document.getElementById('perfil-badge-membro').style.display = 'inline-flex'
  }

  async function uploadFoto(input) {
    const file = input.files[0]
    if (!file) return
    if (file.size > 3 * 1024 * 1024) { toast('Foto muito grande. Máximo 3MB.', 'err'); return }

    document.getElementById('upload-progress').style.display = 'block'

    const ext  = file.name.split('.').pop()
    const path = `${ALUNO.user.id}/avatar.${ext}`

    const { error: upErr } = await db.storage.from('avatares-lms').upload(path, file, { upsert: true, contentType: file.type })
    if (upErr) { console.error(upErr); toast('Erro ao enviar foto.', 'err'); document.getElementById('upload-progress').style.display = 'none'; return }

    const { data: { publicUrl } } = db.storage.from('avatares-lms').getPublicUrl(path)
    const fotoUrl = publicUrl + '?t=' + Date.now()

    const { error: dbErr } = await db.from('alunos').update({ foto_url: fotoUrl }).eq('id', ALUNO.user.id)
    if (dbErr) { toast('Erro ao salvar foto.', 'err'); document.getElementById('upload-progress').style.display = 'none'; return }

    alunoAtual.foto_url = fotoUrl
    preencherFormulario(alunoAtual)
    document.getElementById('upload-progress').style.display = 'none'
    toast('Foto atualizada!')
  }

  async function salvarDados(e) {
    e.preventDefault()
    const nome     = document.getElementById('campo-nome').value.trim()
    const apelido  = document.getElementById('campo-apelido').value.trim()
    const telefone = document.getElementById('campo-telefone').value.trim()
    if (!nome) { toast('Nome é obrigatório.', 'err'); return }

    const { error } = await db.from('alunos').update({ nome, apelido: apelido || null, telefone }).eq('id', ALUNO.user.id)
    if (error) { toast('Erro ao salvar dados.', 'err'); return }

    alunoAtual = { ...alunoAtual, nome, apelido, telefone }
    const nomeExibir = apelido || nome.split(' ')[0]
    document.getElementById('plat-user-nome').textContent = nomeExibir
    preencherFormulario(alunoAtual)
    cancelarEditar('dados')
    toast('Dados salvos com sucesso!')
  }

  async function salvarEndereco(e) {
    e.preventDefault()
    const campos = ['cep','logradouro','numero','complemento','bairro','cidade','uf']
    const patch  = {}
    campos.forEach(c => { patch[c] = document.getElementById(`campo-${c}`).value.trim() || null })

    const { error } = await db.from('alunos').update(patch).eq('id', ALUNO.user.id)
    if (error) { toast('Erro ao salvar endereço.', 'err'); return }

    alunoAtual = { ...alunoAtual, ...patch }
    cancelarEditar('end')
    toast('Endereço salvo com sucesso!')
  }

  async function enviarResetSenha() {
    const email = alunoAtual?.email
    if (!email) return
    const { error } = await db.auth.resetPasswordForEmail(email, {
      redirectTo: `${location.origin}/cursos-login.html`
    })
    if (error) { toast('Erro ao enviar e-mail.', 'err'); return }
    toast('E-mail de redefinição enviado! Verifique sua caixa de entrada.')
  }

  document.addEventListener('plataforma:ready', ({ detail: { aluno } }) => {
    alunoAtual = aluno
    document.getElementById('plat-user-tipo').textContent = aluno.is_membro ? '⭐ Membro' : 'Aluno'
    preencherFormulario(aluno)
  })
</script>

<style>
.perfil-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  max-width: 900px;
}
.perfil-card-id {
  grid-column: 1 / -1;
  padding: 24px 28px;
}
.perfil-avatar-wrap {
  display: flex; align-items: center; gap: 20px;
}

/* Avatar clicável */
.perfil-avatar-container {
  position: relative; cursor: pointer; flex-shrink: 0;
  width: 80px; height: 80px; border-radius: 50%;
}
.perfil-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--brand-deep), var(--brand));
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; font-weight: 900; color: #fff;
  overflow: hidden;
  transition: filter 0.2s;
}
.perfil-avatar-overlay {
  position: absolute; inset: 0; border-radius: 50%;
  background: rgba(0,0,0,0.55);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; color: #fff; opacity: 0;
  transition: opacity 0.2s;
}
.perfil-avatar-overlay span { font-size: 10px; font-weight: 700; }
.perfil-avatar-container:hover .perfil-avatar-overlay { opacity: 1; }
.perfil-avatar-container:hover .perfil-avatar { filter: brightness(0.7); }

.perfil-nome-grande { font-size: 1.2rem; font-weight: 800; color: var(--text); }
.perfil-apelido { font-size: 13px; color: var(--brand); font-weight: 600; margin-top: 2px; }
.perfil-email { font-size: 13px; color: var(--muted); margin-top: 4px; }

.perfil-section { padding: 22px 24px; }
.perfil-section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.perfil-section-header h3 { font-size: 14px; font-weight: 800; color: var(--text); }

.perfil-campos {
  display: flex; flex-wrap: wrap; gap: 14px;
}
.perfil-campo {
  display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px;
}
.perfil-campo label {
  font-size: 11.5px; font-weight: 700; color: var(--muted); letter-spacing: 0.3px;
  text-transform: uppercase;
}
.perfil-campo input {
  padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 9px;
  font-size: 13.5px; font-family: inherit; color: var(--text);
  background: #fff; outline: none; transition: border-color 0.2s;
}
.perfil-campo input:disabled {
  background: var(--bg); color: var(--text); cursor: default;
  border-color: transparent;
}
.perfil-campo input:not(:disabled):focus { border-color: var(--brand); }

@media (max-width: 720px) {
  .perfil-grid { grid-template-columns: 1fr; }
  .perfil-card-id { grid-column: 1; }
}
@media (max-width: 480px) {
  .perfil-avatar-wrap { flex-direction: column; align-items: flex-start; gap: 12px; }
}
</style>

</body>
</html>
